# stacktracer/config/defaults.yaml
#
# Package-shipped defaults. NEVER edit this file directly.
# Override in your project's stacktracer.yaml — user config wins on every key.
#
# This file represents the full production stack:
#   nginx → gunicorn (UvicornWorker) → uvicorn → Django → postgres/redis
#
# Users only need to specify what they want to change.

# ── Probes ────────────────────────────────────────────────────────────────
# Full stack enabled by default. Each probe gracefully no-ops if the
# corresponding server is not running or not installed.
probes:
  - django
  - asyncio
  - uvicorn
  - gunicorn
  - nginx

# ── Sampling ──────────────────────────────────────────────────────────────
sample_rate: 0.01          # 1% — safe default for production
snapshot_interval: 15.0    # seconds between temporal graph snapshots
flush_interval: 10         # seconds between uploader batch flushes
buffer_size: 10000         # EventBuffer max size before drop

# ── Redaction ─────────────────────────────────────────────────────────────
# Event metadata fields that are redacted before storage or upload.
redact_fields:
  - password
  - token
  - secret
  - authorization
  - api_key
  - cookie

# ── Semantic aliases ──────────────────────────────────────────────────────
# Human labels mapped to graph nodes/services for DSL queries:
#   SHOW latency WHERE system = "api"
#   BLAME WHERE system = "db"
#
# Users add their own labels in stacktracer.yaml semantic section.
# Labels with the same name as a default are overridden by user config.
semantic:
  - label: api
    description: Public-facing API surface
    services: []
    node_patterns:
      - "django::/api/.*"
      - "uvicorn::/api/.*"

  - label: db
    description: All database interactions
    services:
      - postgres
      - mysql
      - sqlite
      - redis
    node_patterns: []

  - label: worker
    description: Background task workers
    services:
      - celery
    node_patterns:
      - "celery::.*"

  - label: gateway
    description: Reverse proxy and ingress layer
    services:
      - nginx
    node_patterns:
      - "nginx::.*"

# ── Normalization rules ───────────────────────────────────────────────────
# Applied AFTER built-in patterns (UUID, numeric ID, memory address, SQL).
# Built-in patterns always run — these add to them.
# Format: service (or "*" for all), pattern (regex), replacement.
normalize:
  - service: django
    pattern: "/api/v\\d+/"
    replacement: "/api/{version}/"
    description: Collapse versioned API prefixes

  - service: django
    pattern: "\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b"
    replacement: "{uuid}"
    description: Collapse UUIDs in Django paths (supplement to built-in)

  - service: celery
    pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-.*$"
    replacement: "{task_id}"
    description: Collapse Celery task IDs used as node names

# ── Graph compactor ───────────────────────────────────────────────────────
compactor:
  max_nodes: 5000          # hard cap on RuntimeGraph node count
  evict_to_ratio: 0.80     # evict to 80% of max_nodes when cap hit
  node_ttl_s: 3600.0       # evict nodes not seen for 1 hour
  min_call_count: 5        # never TTL-evict nodes called >= 5 times
                           # protects hot nodes from TTL churn

# ── Active request tracker ────────────────────────────────────────────────
active_requests:
  ttl_s: 30.0              # evict in-flight entries after 30s (safety valve)
  max_size: 10000          # hard cap — FIFO eviction at cap

# ── nginx probe config ────────────────────────────────────────────────────
nginx:
  mode: log              # auto | kprobe | lua | log
                           # auto: try kprobe, try lua, fall back to log
  log_path: /mnt/c/Users/humbulani/nginx-1.24.0/logs/access.log
  lua_host: 127.0.0.1
  lua_port: 9119           # UDP port nginx.lua sends events to

# ── gunicorn config ───────────────────────────────────────────────────────
gunicorn:
  worker_class: uvicorn.workers.UvicornWorker
  # Used by gunicorn probe to understand worker type for correct observation

# ── View function observation (sys.monitoring / sys.setprofile) ───────────
# Controls which Python modules are observed for django.view.enter /
# django.view.exit events via sys.monitoring (3.12+) or sys.setprofile (3.11).
#
# Without this list, view-level tracing is disabled — the django probe still
# gives you request.entry / request.exit (middleware) and django.db.query
# (execute_wrapper), but not per-function granularity inside views.
#
# Set this to your application's top-level package name(s).
# Matching is by filename substring — "myapp" matches any file whose path
# contains "myapp", so it covers myapp/views.py, myapp/api/orders.py, etc.
#
# Narrower is better: observing "myapp" rather than all Python code keeps
# overhead low and the graph focused on your code, not framework internals.
#
# Uncomment and fill in your app name:
# stacktracer.yaml
observe:
  modules:
    - django_tracer.views      # IndexView, AsyncView, SlowView, DbView + any FBVs
    - django_tracer.tasks      # if you have a tasks.py, else remove this line
  functions: []                # leave empty unless you want to add specific helpers later