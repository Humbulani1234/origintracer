# OriginTracer configuration for the Django + Celery demo application.
#
# Built-in probes (from origintracer.probes.*):
#   django - TracerMiddleware + View.dispatch + ORM execute_wrapper
#   celery - task_prerun/task_postrun worker_process_init signals
#
# Custom rules are auto-discovered from:
#   origintracer/rules/*_rules.py

probes:
  - asyncio
  - django
  - celery
  - redis

rules:
  - new_sync_call_after_deployment
  - asyncio_event_loop_starvation
  - n_plus_one_queries
  - db_query_hotspot
  - celery_retry_amplification
  - sync_db_in_celery
  - celery_task_duration_spike

semantic:
  - label: web
    description: HTTP entry layer - gunicorn and uvicorn
    services:
      - gunicorn
      - uvicorn
    node_patterns: []

  - label: django
    description: Django application layer
    services:
      - django
    node_patterns: []

  - label: celery
    description: Celery task nodes only
    services:
      - celery
    node_patterns:
      - "celery::.*"

  - label: worker
    description: Full worker layer - celery tasks and any DB they touch
    services:
      - celery
      - sqlite
      - postgres
    node_patterns:
      - "celery::.*"
      - "django::SELECT.*"
      - "django::INSERT.*"
      - "django::UPDATE.*"