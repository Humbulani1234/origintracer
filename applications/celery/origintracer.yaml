# stacktracer.yaml
# StackTracer configuration for the Django + Celery demo application.
#
# Built-in probes (from stacktracer.probes.*):
#   django   — TracerMiddleware + View.dispatch + ORM execute_wrapper
#   gunicorn — on_starting / post_fork / worker_exit hooks
#   uvicorn  — request.receive / response.send events
#   celery   — task_prerun / task_postrun / worker_process_init signals
#
# Custom rules are auto-discovered from:
#   stacktracer/rules/*_rules.py
# No YAML entry needed for those files.

probes:
  - celery
  - redis

semantic:
  - label: web
    description: HTTP entry layer — gunicorn and uvicorn
    services:
      - gunicorn
      - uvicorn
    node_patterns: []

  - label: django
    description: Django application layer
    services:
      - django
    node_patterns: []

  - label: celery
    description: Celery task nodes only
    services:
      - celery
    node_patterns:
      - "celery::.*"

  - label: worker
    description: Full worker layer — celery tasks and any DB they touch
    services:
      - celery
      - sqlite
      - postgres
    node_patterns:
      - "celery::.*"
      - "django::SELECT.*"
      - "django::INSERT.*"
      - "django::UPDATE.*"