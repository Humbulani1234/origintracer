repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length", "65"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]
        pass_filenames: false
        exclude: "^tests/"
        additional_dependencies:
          - types-PyYAML
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        args:
          - tests/
          - -x
          - -q
          - --tb=short
        always_run: true