# Package-shipped defaults.
# Override in your project's origintracer.yaml.

# ---------------- Probe activation ---------------------------

# builtin_probes: Python module paths to import at init() time.
# All built-in probes are listed here. 
builtin_probes:
  - ".probes.asyncio_probe"
  - ".probes.django_probe"


# probes: Names of probes to actually start.
# User origintracer.yaml replaces this list.
probes:
  - django
  - asyncio

# ---------------- Rules activation ---------------------------

# builtin_rules: Python module paths to import at init() time.
builtin_rules:
  - ".rules.asyncio_rules"
  - ".rules.django_rules"

rules:
  - new_sync_call_after_deployment
  - asyncio_event_loop_starvation
  - n_plus_one_queries
  - db_query_hotspot

# ---- Event buffer -----------------------------------------

buffer_size: 10000
 
# ----- Snapshot and flush intervals -------------------------

# seconds between temporal graph snapshots
snapshot_interval: 15.0
# seconds between uploader batch flushes
flush_interval: 10
endpoint: http://localhost:8001

# ----- Semantic aliases ----------------------------------------

# Human labels mapped to graph nodes/services for DSL queries:
#   SHOW latency WHERE system = "api"
#   BLAME WHERE system = "db"
# Users add their own labels in origintracer.yaml semantic section.
# Labels with the same name as a default are overridden by user config.
semantic:
  - label: api
    description: Public-facing API surface
    services: []
    node_patterns:
      - "django::/api/.*"
      - "uvicorn::/api/.*"

  - label: db
    description: All database interactions
    services:
      - postgres
      - mysql
      - sqlite
      - redis
    node_patterns: []

  - label: worker
    description: Background task workers
    services:
      - celery
      - gunicorn
    node_patterns:
      - "celery::.*"
      - "gunicorn::.*"

  - label: gateway
    description: Reverse proxy and ingress layer
    services:
      - nginx
    node_patterns:
      - "nginx::.*"
  
  - label: http
    description: HTTP layer - nginx and uvicorn
    services:
      - nginx
      - uvicorn
    node_patterns: []

  - label: django
    description: Django application layer
    services:
      - django
    node_patterns: []

  - label: database
    description: Database query nodes (ORM level)
    services: []
    node_patterns:
      - "django::SELECT.*"
      - "django::INSERT.*"
      - "django::UPDATE.*"
      - "django::DELETE.*"
  
  - label: export
    description: "The full export pipeline (Exporter service + all dependencies)"
    services:
      - exporter
    node_patterns:
      - "django::handle_export"
      - "django::flags_client.*"
    tags:
      - revenue-critical

  - label: auth
    description: "Authentication and authorisation"
    services:
      - auth
    node_patterns:
      - "django::authenticate"
      - "django::check_permissions"

# -------------- Normalization rules -----------------------------------

# Applied after built-in patterns (UUID, numeric ID, memory address, SQL).
# Built-in patterns always run - these add to them.
# Format: service (or "*" for all), pattern (regex), replacement.
normalize:
  - service: django
    pattern: "/api/v\\d+/"
    replacement: "/api/{version}/"
    description: Collapse versioned API prefixes

  - service: django
    pattern: "\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b"
    replacement: "{uuid}"
    description: Collapse UUIDs in Django paths (supplement to built-in)

  - service: celery
    pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-.*$"
    replacement: "{task_id}"
    description: Collapse Celery task IDs used as node names

# ------------------ Graph compactor ----------------------------------

compactor:
  # hard cap on RuntimeGraph node count
  max_nodes: 5000
  # evict to 80% of max_nodes when cap hit
  evict_to_ratio: 0.80
  # evict nodes not seen for 1 hour
  node_ttl_s: 3600.0
  # never TTL-evict nodes called >= 5 times
  min_call_count: 5

# --------- Active request tracker ----------------------------------

active_requests:
  # evict in-flight entries after 30s (safety valve)
  ttl_s: 30.0
  # hard cap - FIFO eviction at cap
  max_size: 10000